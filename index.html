<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encanto em Crochê</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Quicksand', sans-serif;
  background:#fdf6f9;
  color:#ff4d88;
}

header{
  background:#ffd6e0;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
}

header img{
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid #ff8fab;
}

h1{
  font-family:'Pacifico';
  cursor:pointer;
}

.container{ padding:15px; }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  padding:10px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  text-align:center;
}

.card img{
  width:100%;
  border-radius:10px;
}

button{
  background:#ff8fab;
  border:none;
  padding:6px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  margin:2px;
}

#cart{
  position:fixed;
  bottom:10px;
  right:10px;
  background:#ff8fab;
  padding:12px;
  border-radius:50%;
}

#cartBox{
  position:fixed;
  bottom:70px;
  right:10px;
  background:#fff;
  padding:10px;
  border-radius:10px;
  display:none;
  width:250px;
}

#admin{
  display:none;
  background:#fff;
  padding:15px;
  position:fixed;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  border-radius:10px;
  width:300px;
}

input, textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

.close{ background:red; }

/* FAQ */
.faq{
  background:#ffe4ec;
  padding:20px;
  margin-top:20px;
}

.faq-btn{
  width:100%;
  text-align:left;
  background:#ff8fab;
  padding:10px;
  border-radius:8px;
  color:#fff;
  border:none;
  margin-top:5px;
}

.faq-content{
  display:none;
  background:#fff;
  padding:10px;
  border-radius:8px;
}

footer{
  text-align:center;
  background:#ffd6e0;
  padding:15px;
}
</style>
</head>

<body>

<header>
  <img src="https://i.imgur.com/l6Cf6bK.png">
  <h1 id="title">Encanto em Crochê</h1>
</header>

<div class="container">
  <div class="grid" id="products"></div>
</div>

<div id="cart">🛒</div>

<div id="cartBox">
  <h3>Carrinho</h3>
  <div id="cartItems"></div>
  <button onclick="finish()">Finalizar</button>
</div>

<!-- ADMIN -->
<div id="admin">
  <h3>Painel ADM</h3>

  <input id="name" placeholder="Nome do produto">
  <input id="price" placeholder="Preço">
  <textarea id="desc" placeholder="Descrição"></textarea>

  <input id="msg" placeholder="Mensagem WhatsApp (ex: Quero uma roupa de bebê)">

  <input type="file" id="file">
  <input id="img" placeholder="OU URL da imagem">

  <button onclick="addProduct()">Salvar</button>
  <button class="close" onclick="closeAdmin()">Fechar</button>
</div>

<!-- FAQ -->
<div class="faq">
  <h2>❓ Perguntas Frequentes</h2>

  <button class="faq-btn">📦 Como funciona a entrega?</button>
  <div class="faq-content">Combinamos tudo pelo WhatsApp 💖</div>

  <button class="faq-btn">🧶 Quando foi criada?</button>
  <div class="faq-content">Criada para trazer peças artesanais únicas.</div>

  <button class="faq-btn">💰 Preço médio?</button>
  <div class="faq-content">Entre R$40 e R$300.</div>

  <button class="faq-btn">📞 Como comprar?</button>
  <div class="faq-content">Adicione ao carrinho e finalize no WhatsApp.</div>
</div>

<footer>
  © Encanto em Crochê 💖
</footer>

<script>
let products = JSON.parse(localStorage.getItem("produtos")) || [];
let cart = [];
let editIndex = -1;

const fileInput = document.getElementById("file");

function saveStorage(){
  localStorage.setItem("produtos", JSON.stringify(products));
}

function render(){
  let html="";
  products.forEach((p,i)=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <h4>${p.name || "Sem nome"}</h4>
      <p>${p.desc || ""}</p>
      <p><b>R$ ${p.price}</b></p>
      <button onclick="addCart(${i})">Adicionar</button>
      <button onclick="editProduct(${i})">Editar</button>
      <button onclick="deleteProduct(${i})">Excluir</button>
    </div>`;
  });
  document.getElementById("products").innerHTML = html;
}

function addProduct(){
  let file = fileInput.files[0];

  if(file){
    let reader = new FileReader();
    reader.onload = e => saveData(e.target.result);
    reader.readAsDataURL(file);
  }else{
    saveData(document.getElementById("img").value);
  }
}

function saveData(image){
  let p = {
    name: document.getElementById("name").value,
    price: document.getElementById("price").value,
    desc: document.getElementById("desc").value,
    msg: document.getElementById("msg").value,
    img: image
  };

  if(editIndex === -1){
    products.push(p);
  }else{
    products[editIndex] = p;
    editIndex = -1;
  }

  saveStorage();
  render();
  clearFields();
}

function editProduct(i){
  let p = products[i];
  name.value = p.name;
  price.value = p.price;
  desc.value = p.desc;
  img.value = p.img;
  msg.value = p.msg || "";
  editIndex = i;
  document.getElementById("admin").style.display="block";
}

function deleteProduct(i){
  products.splice(i,1);
  saveStorage();
  render();
}

function clearFields(){
  name.value="";
  price.value="";
  desc.value="";
  img.value="";
  msg.value="";
  fileInput.value="";
}

function addCart(i){
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  let html="";
  cart.forEach(p=>{
    html+=`<p>${p.name}</p>`;
  });
  document.getElementById("cartItems").innerHTML = html;
}

document.getElementById("cart").onclick=()=>{
  let box=document.getElementById("cartBox");
  box.style.display = box.style.display=="block"?"none":"block";
}

function finish(){
  let msg="Olá, quero comprar:%0A";

  cart.forEach(p=>{
    if(p.msg){
      msg += "- " + p.msg + "%0A";
    }else{
      msg += "- " + p.name + " R$" + p.price + "%0A";
    }
  });

  window.open(`https://wa.me/55980751104?text=${msg}`);
}

function closeAdmin(){
  document.getElementById("admin").style.display="none";
}

let click=0;
document.getElementById("title").onclick=()=>{
  click++;
  if(click==5){
    document.getElementById("admin").style.display="block";
  }
}

/* FAQ */
document.querySelectorAll(".faq-btn").forEach(btn=>{
  btn.onclick = ()=>{
    let content = btn.nextElementSibling;
    content.style.display =
      content.style.display === "block" ? "none" : "block";
  }
});

render();
</script>

</body>
</html>
