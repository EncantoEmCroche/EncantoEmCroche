<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encanto em Crochê</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Quicksand';
  background:#fdf6f9;
  color:#ff4d88;
}

header{
  background:#ffd6e0;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
}

header img{
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid #ff8fab;
}

h1{
  font-family:'Pacifico';
  cursor:pointer;
}

.container{ padding:15px; }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  padding:10px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  text-align:center;
}

.card img{
  width:100%;
  border-radius:10px;
}

button{
  background:#ff8fab;
  border:none;
  padding:6px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  margin:2px;
}

.admin-btn{
  background:#333;
}

.close{ background:red; }

#cart{
  position:fixed;
  bottom:10px;
  right:10px;
  background:#ff8fab;
  padding:12px;
  border-radius:50%;
}

#cartBox{
  position:fixed;
  bottom:70px;
  right:10px;
  background:#fff;
  padding:10px;
  border-radius:10px;
  display:none;
  width:250px;
}

#admin{
  display:none;
  background:#fff;
  padding:15px;
  position:fixed;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  border-radius:10px;
  width:300px;
}

input, textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

.faq{
  background:#ffe4ec;
  padding:20px;
  margin-top:20px;
}

.faq-btn{
  width:100%;
  background:#ff8fab;
  padding:10px;
  border-radius:8px;
  color:#fff;
  border:none;
  margin-top:5px;
}

.faq-content{
  display:none;
  background:#fff;
  padding:10px;
  border-radius:8px;
}

footer{
  text-align:center;
  background:#ffd6e0;
  padding:15px;
}
</style>
</head>

<body>

<header>
  <img src="https://i.imgur.com/l6Cf6bK.png">
  <h1 id="title">Encanto em Crochê</h1>
</header>

<div class="container">
  <div class="grid" id="products"></div>
</div>

<div id="cart">🛒</div>

<div id="cartBox">
  <h3>Carrinho</h3>
  <div id="cartItems"></div>
  <button onclick="finish()">Finalizar</button>
</div>

<div id="admin">
  <h3>Painel ADM</h3>

  <input id="name" placeholder="Nome do produto">
  <input id="price" placeholder="Preço">
  <textarea id="desc" placeholder="Descrição"></textarea>
  <input id="msg" placeholder="Mensagem WhatsApp">

  <input type="file" id="file">
  <input id="img" placeholder="OU URL da imagem">

  <button onclick="addProduct()">Salvar</button>
  <button class="close" onclick="closeAdmin()">Fechar</button>
</div>

<div class="faq">
  <h2>❓ FAQ</h2>
  <button class="faq-btn">Entrega?</button>
  <div class="faq-content">Combinado via WhatsApp</div>

  <button class="faq-btn">Preço?</button>
  <div class="faq-content">R$40 a R$300</div>
</div>

<footer>© Encanto em Crochê 💖</footer>

<script>
let products = JSON.parse(localStorage.getItem("produtos")) || [];
let cart = [];
let editIndex = -1;
let isAdmin = false;

const fileInput = document.getElementById("file");

function saveStorage(){
  localStorage.setItem("produtos", JSON.stringify(products));
}

function render(){
  let html="";
  products.forEach((p,i)=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>${p.desc}</p>
      <p><b>R$ ${p.price}</b></p>

      <button onclick="addCart(${i})">Adicionar</button>

      ${isAdmin ? `
        <button class="admin-btn" onclick="editProduct(${i})">Editar</button>
        <button class="admin-btn" onclick="deleteProduct(${i})">Excluir</button>
      ` : ``}
    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

function addProduct(){
  let file = fileInput.files[0];

  if(file){
    let reader = new FileReader();
    reader.onload = e => saveData(e.target.result);
    reader.readAsDataURL(file);
  }else{
    saveData(img.value);
  }
}

function saveData(image){
  let p = {
    name: name.value,
    price: price.value,
    desc: desc.value,
    msg: msg.value,
    img: image
  };

  if(editIndex === -1){
    products.push(p);
  }else{
    products[editIndex] = p;
    editIndex = -1;
  }

  saveStorage();
  render();
  clearFields();
}

function editProduct(i){
  let p = products[i];
  name.value = p.name;
  price.value = p.price;
  desc.value = p.desc;
  img.value = p.img;
  msg.value = p.msg;
  editIndex = i;
}

function deleteProduct(i){
  products.splice(i,1);
  saveStorage();
  render();
}

function clearFields(){
  name.value="";
  price.value="";
  desc.value="";
  img.value="";
  msg.value="";
  fileInput.value="";
}

function addCart(i){
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  let html="";
  cart.forEach(p=>{
    html+=`<p>${p.name}</p>`;
  });
  cartItems.innerHTML = html;
}

cart.onclick=()=>{
  cartBox.style.display = cartBox.style.display=="block"?"none":"block";
}

function finish(){
  let msgText="Olá, quero comprar:%0A";

  cart.forEach(p=>{
    msgText += "- " + (p.msg || p.name) + "%0A";
  });

  window.open(`https://wa.me/55980751104?text=${msgText}`);
}

function closeAdmin(){
  admin.style.display="none";
  isAdmin=false;
  render();
}

let click=0;
title.onclick=()=>{
  click++;
  if(click==5){
    admin.style.display="block";
    isAdmin=true;
    render();
  }
}

/* FAQ */
document.querySelectorAll(".faq-btn").forEach(btn=>{
  btn.onclick = ()=>{
    let c = btn.nextElementSibling;
    c.style.display = c.style.display=="block"?"none":"block";
  }
});

render();
</script>

</body>
</html>
