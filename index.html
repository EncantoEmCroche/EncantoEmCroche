<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encanto em Crochê</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Quicksand';
  background:#fff0f5;
}

header{
  background:#ffc1d6;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
}

header img{
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid #ff8fab;
}

h1{
  font-family:'Pacifico';
  color:#ff4d88;
  cursor:pointer;
}

.grid{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  padding:10px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  border-radius:10px;
}

.btn{
  background:#ff8fab;
  border:none;
  padding:8px;
  border-radius:8px;
  color:#fff;
  width:100%;
  margin-top:5px;
}

/* CARRINHO */
#cartBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff4d88;
  color:#fff;
  padding:15px;
  border-radius:50%;
  font-size:20px;
}

#cartBox{
  position:fixed;
  bottom:80px;
  right:20px;
  width:260px;
  background:#fff;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.2);
  padding:10px;
  display:none;
}

.itemCart{
  background:#ffe4ec;
  margin:5px 0;
  padding:5px;
  border-radius:8px;
}

.total{
  font-weight:bold;
  margin-top:10px;
}

/* ADMIN */
#login, #admin{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:300px;
}

input{
  width:100%;
  margin:5px 0;
  padding:8px;
}

</style>
</head>

<body>

<header>
  <img src="https://i.imgur.com/l6Cf6bK.png">
  <h1 id="title">Encanto em Crochê</h1>
</header>

<div class="grid" id="products"></div>

<!-- BOTÃO CARRINHO -->
<div id="cartBtn">🛒</div>

<!-- CARRINHO -->
<div id="cartBox">
  <h3>Seu Carrinho</h3>
  <div id="cartItems"></div>
  <div class="total" id="total"></div>
  <button class="btn" onclick="finalizar()">Finalizar no WhatsApp</button>
</div>

<!-- LOGIN -->
<div id="login">
  <h3>🔐 Acesso ADM</h3>
  <input id="senha" placeholder="Senha">
  <button onclick="logar()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="admin">
  <h3>Painel ADM</h3>

  <input id="name" placeholder="Nome">
  <input id="price" placeholder="Preço">
  <input id="desc" placeholder="Descrição">
  <input id="msg" placeholder="Mensagem WhatsApp">
  <input id="img" placeholder="Imagem URL">

  <button onclick="save()">Salvar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZaqRqe5v7GepCcsR1xQeqVHQJr9n3vnw",
  authDomain: "encanto-croche.firebaseapp.com",
  projectId: "encanto-croche",
  storageBucket: "encanto-croche.firebasestorage.app",
  messagingSenderId: "608988750569",
  appId: "1:608988750569:web:04c95d0c4dc80bd2f74678"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products=[];
let cart=[];

const grid = document.getElementById("products");

onSnapshot(collection(db,"produtos"), snap=>{
  products=[];
  snap.forEach(d=>{
    products.push(d.data());
  });
  render();
});

function render(){
  let html="";
  products.forEach((p,i)=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>R$ ${p.price}</p>
      <button class="btn" onclick="addCart(${i})">Adicionar</button>
    </div>`;
  });
  grid.innerHTML=html;
}

window.addCart=(i)=>{
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  let html="";
  let total=0;

  cart.forEach((p,i)=>{
    total += Number(p.price);
    html+=`
    <div class="itemCart">
      ${p.name}
      <button onclick="removeItem(${i})">❌</button>
    </div>`;
  });

  cartItems.innerHTML=html;
  totalDiv.innerText="Total: R$ "+total;
}

window.removeItem=(i)=>{
  cart.splice(i,1);
  renderCart();
}

cartBtn.onclick=()=>{
  cartBox.style.display = cartBox.style.display=="block"?"none":"block";
}

window.finalizar=()=>{
  let msg="Olá, quero comprar:%0A";

  cart.forEach(p=>{
    msg += "- " + (p.msg || p.name) + "%0A";
  });

  window.open("https://wa.me/55980751104?text="+msg);
}

/* LOGIN */
let click=0;
title.onclick=()=>{
  click++;
  if(click==5){
    login.style.display="block";
  }
}

window.logar=()=>{
  if(senha.value==="0107"){
    login.style.display="none";
    admin.style.display="block";
  }
}

/* SALVAR */
window.save=async()=>{
  await addDoc(collection(db,"produtos"),{
    name:name.value,
    price:price.value,
    desc:desc.value,
    msg:msg.value,
    img:img.value
  });
};
</script>

</body>
</html>
